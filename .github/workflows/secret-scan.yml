name: secret-scan

# Rejects commits/PRs that introduce hardcoded credentials. Scans the working
# tree (not full history) so it goes green on a clean checkout and fails the
# instant a new secret lands in a tracked file. Once the historical leaks in
# this branch are purged, add `--no-git` -> full history scan to also gate the past.

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan working tree for hardcoded secrets
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --no-git \
              --redact \
              --verbose \
              --exit-code=1
