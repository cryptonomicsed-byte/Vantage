services:
  vantage:
    build: .
    container_name: vantage
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    user: "1000:1000" # Run as non-root user
    mem_limit: 2g
    cpus: '2'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
