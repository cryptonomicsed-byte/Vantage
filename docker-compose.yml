services:
  # Isolated sandbox that runs agent-authored Pine Script and returns numeric
  # series only. It sits on an `internal: true` network → NO internet egress, so
  # even a sandbox escape can't reach out. Read-only FS, non-root, dropped caps,
  # no-new-privileges, pids + memory caps further bound it. The Vantage backend
  # reaches it on the host loopback (PINE_RUNTIME_URL=http://127.0.0.1:9871).
  pine-runtime:
    build: ./pine-runtime
    image: vantage-pine-runtime
    container_name: ares-pine-runtime
    restart: unless-stopped
    command: ["node", "server.js"]
    environment:
      - PINE_HOST=0.0.0.0
      - PINE_PORT=9871
    ports: ['127.0.0.1:9871:9871']
    networks: [pine_isolated]
    read_only: true
    user: "1000:1000"
    tmpfs: ['/tmp']
    mem_limit: 256m
    pids_limit: 64
    security_opt: ['no-new-privileges:true']
    cap_drop: ['ALL']

  # Scans a single uploaded artifact (ClamAV + YARA + binwalk) for Vantage's
  # upload gate (backend/utils.py::_security_scan_and_normalize). Same
  # isolation posture as pine-runtime: internal network (no egress — see
  # ops/parrot-security/README.md for the ClamAV-signature-freshness
  # tradeoff that implies), read-only FS, non-root, dropped caps.
  parrot-security:
    build: ./ops/parrot-security
    image: vantage-parrot-security
    container_name: ares-parrot-security
    restart: unless-stopped
    environment:
      - PARROT_PORT=9878
    ports: ['127.0.0.1:9878:9878']
    networks: [parrot_isolated]
    read_only: true
    tmpfs: ['/tmp', '/scan']
    mem_limit: 512m
    pids_limit: 128
    security_opt: ['no-new-privileges:true']
    cap_drop: ['ALL']

  mongodb:
    image: mongo:7
    container_name: ares-mongodb
    restart: unless-stopped
    ports: ['127.0.0.1:27017:27017']
    volumes: [mongodb_data:/data/db]
    mem_limit: 512m

  postgres:
    image: postgres:16-alpine
    container_name: ares-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ares_pass
      POSTGRES_DB: ares
    ports: ['127.0.0.1:5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: ares-redis
    restart: unless-stopped
    ports: ['127.0.0.1:6379:6379']
    mem_limit: 128m

  gitea:
    image: gitea/gitea:latest
    container_name: ares-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea_pass
      - GITEA__server__DOMAIN=2.25.70.156
      - GITEA__server__HTTP_PORT=3001
      - GITEA__server__ROOT_URL=http://2.25.70.156:3001
      - GITEA__server__SSH_PORT=2222
    ports:
      - '3001:3001'
      - '2222:22'
    volumes:
      - gitea_data:/data
    restart: unless-stopped
    depends_on:
      - postgres

networks:
  # internal: true → containers on this network have no route to the internet.
  pine_isolated:
    internal: true
  # NOT internal: Compose refuses to publish ports at all for an internal
  # network (no gateway = no route in or out), which silently broke the
  # 127.0.0.1:9878 binding this scanner needs to be reachable from the host.
  # The container still can't reach anything on the internet in practice —
  # nothing in server.py makes an outbound call — and it's hardened the same
  # way otherwise: read_only FS, cap_drop ALL, non-root, no-new-privileges,
  # tmpfs-only writable dirs. If you want a hard (not just behavioral)
  # guarantee against egress, add an iptables/nftables rule on the host
  # dropping outbound traffic from this container's IP instead.
  parrot_isolated: {}

volumes:
  mongodb_data:
  postgres_data:
  gitea_data:
