services:
  mongodb:
    image: mongo:7
    container_name: ares-mongodb
    restart: unless-stopped
    ports: ['127.0.0.1:27017:27017']
    volumes: [mongodb_data:/data/db]
    mem_limit: 512m

  postgres:
    image: postgres:16-alpine
    container_name: ares-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ares_pass
      POSTGRES_DB: ares
    ports: ['127.0.0.1:5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: ares-redis
    restart: unless-stopped
    ports: ['127.0.0.1:6379:6379']
    mem_limit: 128m

  gitea:
    image: gitea/gitea:latest
    container_name: ares-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea_pass
      - GITEA__server__DOMAIN=2.25.70.156
      - GITEA__server__HTTP_PORT=3001
      - GITEA__server__ROOT_URL=http://2.25.70.156:3001
      - GITEA__server__SSH_PORT=2222
    ports:
      - '3001:3001'
      - '2222:22'
    volumes:
      - gitea_data:/data
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  mongodb_data:
  postgres_data:
  gitea_data:
